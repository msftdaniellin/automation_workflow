version: 1.0
description: a basic eos upgrade workflow

input:
  - device_name
  - target_eos_version

vars:
  - previous_snapshot: null

tasks:
  start_workflow:
    action: core.echo message="starting workflow to upgrade the device <% ctx().device_name %> to version <% ctx().target_eos_version %>."
    next:
      - do: set_silence_the_device_and_neighbors

  set_silence_the_device_and_neighbors:
    action: network_workflows.common_python_task
    input:
      task: 'device.set_silence_the_device_and_neighbors'
      extra_args: [<% ctx().device_name %>,]
    next:
      - when: <% succeeded() %>
        do: collect_snapshot
      - when: <% failed() %>
        do: workflow_failed

  collect_snapshot:
    action: network_workflows.common_python_task
    input:
      task: 'device.collect_snapshot'
      extra_args: [<% ctx().device_name %>,]
    next:
      - when: <% succeeded() %>
        publish:
          - previous_snapshot: <% result().snapshot %>
        do: get_traffic_drain_config_and_apply
      - when: <% failed() %>
        do: workflow_failed

  get_traffic_drain_config_and_apply:
    action: network_workflows.common_python_task
    input:
      task: 'device.get_traffic_drain_config_and_apply'
      extra_args: [<% ctx().device_name %>,]
    next:
      - when: <% succeeded() %>
        do: check_if_traffic_goes_away
      - when: <% failed() %>
        do: workflow_failed

  check_if_traffic_goes_away:
    action: network_workflows.common_python_task
    input:
      task: 'device.check_if_traffic_goes_away'
      extra_args: [<% ctx().device_name %>,]
    next:
      - when: <% succeeded() %>
        do: upgrade_eos_image
      - when: <% failed() %>
        do: workflow_failed

  upgrade_eos_image:
    action: network_workflows.common_python_task
    input:
      task: 'device.upgrade_eos_image'
      extra_args: [<% ctx().device_name %>,<% ctx().target_eos_version %>]
    next:
      - when: <% succeeded() %>
        do: print_console_info
      - when: <% failed() %>
        do: workflow_failed

  print_console_info:
    action: network_workflows.common_python_task
    input:
      task: 'device.print_console_info'
      extra_args: [<% ctx().device_name %>]
    next:
      - when: <% succeeded() %>
        do: confirm_if_device_booted_up
      - when: <% failed() %>
        do: workflow_failed

  confirm_if_device_booted_up:
    action: core.ask
    input:
      schema:
        type: object
        properties:
          device_status:
            type: string
            enum:
              - deivce_is_up
              - deivce_si_booting_up
            required: True
            description: "confirm device whether booted up?"
    next:
      - when: <% task(confirm_if_device_booted_up).result.response.device_status = deivce_is_up %>
        do: collect_snapshot_and_compare_previous_snapshot
      - when: <% task(confirm_if_device_booted_up).result.response.device_status = deivce_si_booting_up %>
        do: confirm_if_device_booted_up

  collect_snapshot_and_compare_previous_snapshot:
    action: network_workflows.common_python_task
    input:
      task: 'device.collect_snapshot_and_compare_previous_snapshot'
      extra_args: [<% ctx().device_name %>, previous_snapshot]
    next:
      - when: <% succeeded() %>
        do: get_traffic_undrain_config_and_apply
      - when: <% failed() %>
        do: workflow_failed

  get_traffic_undrain_config_and_apply:
    action: network_workflows.common_python_task
    input:
      task: 'device.get_traffic_undrain_config_and_apply'
      extra_args: [<% ctx().device_name %>]
    next:
      - when: <% succeeded() %>
        do: check_if_traffic_comes_back
      - when: <% failed() %>
        do: workflow_failed

  check_if_traffic_comes_back:
    action: network_workflows.common_python_task
    input:
      task: 'device.check_if_traffic_comes_back'
      extra_args: [<% ctx().device_name %>]
    next:
      - when: <% succeeded() %>
        do: clear_alerts
      - when: <% failed() %>
        do: workflow_failed

  clear_alerts:
    action: network_workflows.common_python_task
    input:
      task: 'device.clear_alerts'
      extra_args: [<% ctx().device_name %>]
    next:
      - when: <% succeeded() %>
        do: expire_silence
      - when: <% failed() %>
        do: workflow_failed

  expire_silence:
    action: network_workflows.common_python_task
    input:
      task: 'device.expire_silence'
      extra_args: [<% ctx().device_name %>]
    next:
      - when: <% succeeded() %>
        do: workflow_completed
      - when: <% failed() %>
        do: workflow_failed

  workflow_completed:
    action: core.echo message="Workflow completed, device has been upgraded to <% ctx().target_eos_version %>."

  workflow_failed:
    action: core.echo message="Workflow failed."
